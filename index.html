<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AF Sant Adrià - Auditoría Pro con Informe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="font-sans antialiased min-h-screen flex flex-col md:flex-row bg-[#0B0813]">

    <aside class="w-full md:w-64 bg-brandPanel border-b md:border-b-0 md:border-r border-brandBorder flex flex-col shrink-0">
        <div class="p-6 border-b border-brandBorder flex items-center gap-3">
            <div class="w-10 h-10 rounded-lg bg-gradient-to-tr from-brandPurple to-brandLime flex items-center justify-center text-white"><i class="fa-solid fa-running"></i></div>
            <div>
                <h1 class="font-poppins font-bold text-sm text-white">AF Sant Adrià</h1>
                <span class="text-[9px] text-brandLime tracking-widest uppercase font-semibold">Pro Auditor v2</span>
            </div>
        </div>
        <nav class="flex-grow p-4 space-y-1.5">
            <button onclick="cambiarSeccion('dashboard')" id="nav-dashboard" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-brandText hover:text-white transition active-nav">
                <i class="fa-solid fa-chart-line"></i><span class="text-sm">Dashboard</span>
            </button>
            <button onclick="cambiarSeccion('auditar')" id="nav-auditar" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-brandText hover:text-white transition">
                <i class="fa-solid fa-clipboard-check"></i><span class="text-sm">Auditar</span>
            </button>
            <button onclick="cambiarSeccion('entrenadores')" id="nav-entrenadores" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left text-brandText hover:text-white transition">
                <i class="fa-solid fa-users"></i><span class="text-sm">Coaches</span>
            </button>
        </nav>
    </aside>

    <main class="flex-grow flex flex-col min-w-0">
        <header class="h-16 border-b border-brandBorder bg-brandPanel px-6 flex items-center justify-between">
            <h2 id="sectionTitle" class="font-poppins font-semibold text-white">Panel de Control AF</h2>
            <div class="flex items-center gap-3">
                <span class="text-[10px] text-emerald-400 font-medium flex items-center gap-1">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span> Sistema Inteligente Activo
                </span>
            </div>
        </header>

        <div class="flex-grow p-6 overflow-y-auto">
            <!-- VISTA DASHBOARD -->
            <section id="view-dashboard" class="space-y-6">
                <div id="coachesSummaryList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
                <div class="bg-brandPanel border border-brandBorder rounded-2xl p-6">
                    <h3 class="text-white font-poppins font-semibold mb-4 text-xs uppercase tracking-widest">Auditorías Recientes</h3>
                    <div class="overflow-x-auto"><table class="w-full text-left text-xs"><tbody id="lastAuditsTable"></tbody></table></div>
                </div>
            </section>

            <!-- VISTA AUDITAR -->
            <section id="view-auditar" class="hidden max-w-5xl mx-auto space-y-6 pb-20">
                <form id="auditForm" onsubmit="procesarNuevaAuditoria(event)" class="space-y-6">
                    <!-- Cabecera -->
                    <div class="bg-brandPanel border border-brandBorder rounded-2xl p-6 grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div>
                            <label class="block text-[10px] text-brandText uppercase font-bold mb-2">Entrenador Responsable</label>
                            <select id="formCoachSelect" required onchange="actualizarListaAlumnos(this.value)" class="w-full bg-brandDark border border-brandBorder rounded-xl p-3 text-xs text-white focus:outline-none focus:border-brandLime"></select>
                        </div>
                        <div>
                            <label class="block text-[10px] text-brandText uppercase font-bold mb-2">Alumno a Evaluar</label>
                            <select id="formClientSelect" required class="w-full bg-brandDark border border-brandBorder rounded-xl p-3 text-xs text-white focus:outline-none focus:border-brandLime"></select>
                        </div>
                        <div>
                            <label class="block text-[10px] text-brandText uppercase font-bold mb-2">Fecha y Hora</label>
                            <input type="datetime-local" id="formDateTime" required class="w-full bg-brandDark border border-brandBorder rounded-xl p-3 text-xs text-white focus:outline-none focus:border-brandLime">
                        </div>
                    </div>

                    <!-- Puntos de Auditoría (Generados dinámicamente para incluir observaciones) -->
                    <div id="puntosAuditoriaContainer" class="space-y-6">
                        <!-- Bloque 1: Gestión -->
                        <div class="bg-brandPanel border border-brandBorder rounded-2xl p-6 space-y-4">
                            <h4 class="text-brandLime font-bold text-xs uppercase tracking-widest pb-2 border-b border-brandBorder">1. Gestión de Membr y Programa</h4>
                            <div class="grid grid-cols-1 gap-4" id="seccion-1-puntos"></div>
                        </div>
                        <!-- Bloque 2: Evolt -->
                        <div class="bg-brandPanel border border-brandBorder rounded-2xl p-6 space-y-4">
                            <h4 class="text-brandLime font-bold text-xs uppercase tracking-widest pb-2 border-b border-brandBorder">2. Evolt y Movilidad</h4>
                            <div class="grid grid-cols-1 gap-4" id="seccion-2-puntos"></div>
                        </div>
                        <!-- Bloque 3: MyZone -->
                        <div class="bg-brandPanel border border-brandBorder rounded-2xl p-6 space-y-4">
                            <h4 class="text-brandLime font-bold text-xs uppercase tracking-widest pb-2 border-b border-brandBorder">3. Ecosistema Digital y MyZone</h4>
                            <div class="grid grid-cols-1 gap-4" id="seccion-3-puntos"></div>
                        </div>
                        <!-- Bloque 4: Seguimiento -->
                        <div class="bg-brandPanel border border-brandBorder rounded-2xl p-6 space-y-4">
                            <h4 class="text-brandLime font-bold text-xs uppercase tracking-widest pb-2 border-b border-brandBorder">4. Seguimiento Mensajes App</h4>
                            <div class="grid grid-cols-1 gap-4" id="seccion-4-puntos"></div>
                        </div>
                    </div>

                    <div class="flex justify-end gap-4">
                        <button type="button" onclick="cambiarSeccion('dashboard')" class="px-8 py-3 text-brandText text-xs font-bold">Cancelar</button>
                        <button type="submit" class="bg-brandPurple text-white px-10 py-3 rounded-xl font-bold text-xs shadow-lg hover:scale-105 transition">Finalizar Registro y Generar Informe</button>
                    </div>
                </form>
            </section>

            <section id="view-entrenadores" class="hidden space-y-6"></section>
        </div>
    </main>

    <!-- MODAL DE INFORME FINAL -->
    <div id="modalInforme" class="fixed inset-0 bg-brandDark/90 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-brandPanel border border-brandBorder w-full max-w-2xl rounded-3xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-6 border-b border-brandBorder bg-gradient-to-r from-brandPurple/20 to-transparent flex justify-between items-center">
                <h3 class="text-white font-poppins font-bold text-lg">Informe de Rendimiento Auditoría</h3>
                <button onclick="cerrarModalInforme()" class="text-brandText hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div id="contenidoInforme" class="p-8 overflow-y-auto text-sm space-y-6 text-brandText leading-relaxed">
                <!-- Se inyecta por JS -->
            </div>
            <div class="p-6 border-t border-brandBorder flex gap-4">
                <button onclick="descargarInforme()" class="flex-grow bg-brandDark border border-brandBorder text-white py-3 rounded-xl font-bold text-xs flex items-center justify-center gap-2">
                    <i class="fa-solid fa-file-pdf"></i> Guardar como PDF
                </button>
                <button onclick="cerrarModalInforme()" class="flex-grow bg-brandLime text-brandDark py-3 rounded-xl font-bold text-xs">
                    Entendido, Volver
                </button>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
